apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-backup
  labels:
    app: mysql-backup

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mysql-backup
  labels:
    app: mysql-backup
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mysql-backup
  labels:
    app: mysql-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mysql-backup
subjects:
- kind: ServiceAccount
  name: mysql-backup
  namespace: default
