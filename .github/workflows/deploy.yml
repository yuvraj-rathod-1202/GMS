name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/gms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        service:
          - analytics
          - auth_user
          - courses
          - frontend
          - gateway
          - marks
          - policy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        timeout-minutes: 30
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-to: type=inline
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          no-cache: ${{ matrix.service == 'frontend' }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set image tag
        id: image_tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Update image tags in manifests
        run: |
          IMAGE_TAG=${{ steps.image_tag.outputs.tag }}
          
          # Update all deployment manifests with new image tags
          for service in analytics auth_user courses frontend gateway marks policy; do
            manifest_dir="${service}/manifests"
            if [ -d "$manifest_dir" ]; then
              # Update image in deployment files
              find "$manifest_dir" -name "*-deploy.yaml" -o -name "*deploy.yaml" | while read file; do
                sed -i "s|image: .*/${service}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${service}:${IMAGE_TAG}|g" "$file"
              done
            fi
          done
      
      - name: Deploy MySQL
        run: |
          kubectl apply -f mysql/manifests/ || true
          kubectl rollout status statefulset/mysql -n default --timeout=300s || true
      
      - name: Deploy RabbitMQ
        run: |
          kubectl apply -f rabbitmq/manifests/ || true
          kubectl rollout status deployment/rabbitmq -n default --timeout=300s || true
      
      - name: Deploy Backend Services
        run: |
          # Deploy backend microservices
          for service in auth_user courses gateway marks analytics policy; do
            if [ -d "${service}/manifests" ]; then
              echo "Deploying ${service}..."
              kubectl apply -f ${service}/manifests/
            fi
          done
          
          # Wait for deployments to be ready
          sleep 10
          kubectl rollout status deployment/auth -n default --timeout=300s || true
          kubectl rollout status deployment/courses -n default --timeout=300s || true
          kubectl rollout status deployment/gateway -n default --timeout=300s || true
          kubectl rollout status deployment/marks -n default --timeout=300s || true
          kubectl rollout status deployment/analytics -n default --timeout=300s || true
          kubectl rollout status deployment/policy -n default --timeout=300s || true
      
      - name: Deploy Frontend
        run: |
          if [ -d "frontend/manifests" ]; then
            echo "Deploying frontend..."
            kubectl apply -f frontend/manifests/
            kubectl rollout status deployment/frontend -n default --timeout=300s || true
          fi
      
      - name: Verify Deployment
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n default
          echo ""
          echo "=== Services ==="
          kubectl get services -n default
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n default || true
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ steps.image_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Services" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n default -o wide >> $GITHUB_STEP_SUMMARY || true
