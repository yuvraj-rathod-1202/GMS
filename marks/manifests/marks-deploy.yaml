apiVersion: apps/v1
kind: Deployment
metadata:
  name: marks
  labels:
    app: marks
spec:
  selector:
    matchLabels:
      app: marks
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 3
  template:
    metadata:
      labels:
        app: marks
    spec:
      containers:
        - name: marks
          image: yrrathod/gms_marks
          ports:
            - containerPort: 6000
          envFrom:
            - configMapRef:
                name: marks-config
            - secretRef:
                name: marks-secret